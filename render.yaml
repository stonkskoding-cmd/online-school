version: "1"
services:
  - type: web
    name: online-school-backend
    runtime: node
    plan: free
    rootDir: server
    # postinstall = prisma generate only (fast). Migrations run at start, not during build.
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run db:migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
