version: "1"
services:
  # Frontend (Vite). Render НЕ читает _redirects — нужен rewrite в routes.
  - type: web
    name: online-school-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: online-school-backend
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install --include=dev && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: BACKEND_URL
        value: https://online-school-backend-mqn9.onrender.com
      - key: FRONTEND_URL
        value: https://online-school-frontend-ryc0.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
