name: Ping Backend Keep-Alive

on:
  schedule:
    # каждые 5 минут — страховка на случай, если сервис всё же уснул
    # (Render free tier засыпает после ~15 мин бездействия; самопинг бэкенда
    #  держит его тёплым, а этот крон будит, если процесс перезапустился)
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -fsS --max-time 30 \
            "https://online-school-backend-mqn9.onrender.com/api/health" \
            | tee /dev/stderr
          echo ""
          echo "Backend keep-alive ping OK"
