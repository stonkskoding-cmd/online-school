name: Ping Backend Keep-Alive

on:
  schedule:
    # каждые 10 минут — Render free tier засыпает после ~15 мин бездействия
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -fsS --max-time 30 \
            "https://online-school-backend-mqn9.onrender.com/api/health" \
            | tee /dev/stderr
          echo ""
          echo "Backend keep-alive ping OK"
